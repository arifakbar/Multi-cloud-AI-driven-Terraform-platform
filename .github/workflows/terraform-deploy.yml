name: Terraform Deploy (Reusable)

on:
  workflow_call:
    inputs:
      cloud:
        required: true
        type: string
      working-directory:
        required: true
        type: string
      environment-apply:
        required: true
        type: string
      environment-high-risk:
        required: true
        type: string
      aws-arn:
        required: false
        type: string
        description: 'ARN of the IAM role to assume for AWS'
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
        description: 'AWS region'
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

jobs:
  plan:
    name: Plan (${{ inputs.cloud }})
    runs-on: ubuntu-latest
    outputs:
      high_risk: ${{ steps.check-severity.outputs.high }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure AWS Credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform with Cache
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Terraform Plan
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -out=tfplan

      - name: Export Plan JSON
        working-directory: ${{ inputs.working-directory }}
        run: terraform show -json tfplan > plan.json

      - name: AI Security Analysis
        id: ai-analysis
        uses: ./.github/actions/ai-analysis
        with:
          plan-json-path: ${{ inputs.working-directory }}/plan.json

      - name: Set output
        id: check-severity
        run: echo "high=${{ steps.ai-analysis.outputs.high_risk }}" >> $GITHUB_OUTPUT

  approval:
    name: Approval (${{ inputs.cloud }})
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.high_risk == 'true'
    environment: ${{ inputs.environment-high-risk }}
    steps:
      - run: echo "Manual approval required for high risk changes"

  apply:
    name: Apply (${{ inputs.cloud }})
    runs-on: ubuntu-latest
    needs: [plan, approval]
    if: always() && needs.plan.result == 'success' && (needs.approval.result == 'success' || needs.plan.outputs.high_risk == 'false')
    environment: ${{ inputs.environment-apply }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure AWS Credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform with Cache
        uses: ./.github/actions/terraform-setup
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Terraform Plan (for apply)
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ inputs.working-directory }}
        run: terraform apply -auto-approve tfplan