name: Multi-Cloud Terraform DevSecOps

on:
  push:
    branches: [main]
  pull_request:

env:
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

jobs:

#################################################
# AZURE TERRAFORM PLAN
#################################################

  terraform-azure:
    name: Terraform Plan (Azure)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform Cache
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}

      - name: Terraform Init (Azure)
        run: terraform init
        working-directory: terraform/azure

      - name: Terraform Validate (Azure)
        run: terraform validate
        working-directory: terraform/azure

      - name: Terraform Plan (Azure)
        run: terraform plan -out=tfplan
        working-directory: terraform/azure

      - name: Save Plan Output
        run: terraform show -json tfplan > tfplan.json
        working-directory: terraform/azure

      - name: Upload Azure Plan
        uses: actions/upload-artifact@v4
        with:
          name: azure-plan
          path: terraform/azure/tfplan.json


#################################################
# AWS TERRAFORM PLAN
#################################################

  terraform-aws:
    name: Terraform Plan (AWS)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare Terraform Cache
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}

      - name: Terraform Init (AWS)
        run: terraform init
        working-directory: terraform/aws

      - name: Terraform Validate (AWS)
        run: terraform validate
        working-directory: terraform/aws

      - name: Terraform Plan (AWS)
        run: terraform plan -out=tfplan
        working-directory: terraform/aws

      - name: Save Plan Output
        run: terraform show -json tfplan > tfplan.json
        working-directory: terraform/aws

      - name: Upload AWS Plan
        uses: actions/upload-artifact@v4
        with:
          name: aws-plan
          path: terraform/aws/tfplan.json


#################################################
# AI SECURITY ANALYSIS (RUNS ONCE)
#################################################

  ai-security-analysis:
    name: AI Security Analysis
    needs: [terraform-azure, terraform-aws]
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Azure Plan
        uses: actions/download-artifact@v4
        with:
          name: azure-plan
          path: plans/

      - name: Download AWS Plan
        uses: actions/download-artifact@v4
        with:
          name: aws-plan
          path: plans/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('ai-engine/requirements.txt') }}

      - name: Install Python Dependencies
        run: pip install -r ai-engine/requirements.txt

      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v1

      - name: Cache Vector Index
        uses: actions/cache@v4
        with:
          path: ai-engine/vector_store
          key: ai-vector-index-v1

      - name: Build Vector Index (Only if Missing)
        run: |
          if [ ! -f ai-engine/vector_store/index.faiss ]; then
            echo "Building vector index..."
            python ai-engine/embedder.py
          else
            echo "Vector index already exists"
          fi

      - name: Run AI Security Analysis
        run: |
          python ai-engine/analyzer.py \
            --azure plans/tfplan.json \
            --aws plans/tfplan.json

      - name: Upload AI Report
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-report
          path: ai-engine/reports/


#################################################
# DEPLOYMENT GATE
#################################################

  security-gate:
    name: Security Approval Gate
    needs: ai-security-analysis
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:

      - name: Download AI Report
        uses: actions/download-artifact@v4
        with:
          name: ai-security-report

      - name: Check Risk Score
        run: python ai-engine/gatekeeper.py


#################################################
# TERRAFORM APPLY (AZURE)
#################################################

  apply-azure:
    name: Terraform Apply (Azure)
    needs: security-gate
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/azure

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/azure


#################################################
# TERRAFORM APPLY (AWS)
#################################################

  apply-aws:
    name: Terraform Apply (AWS)
    needs: security-gate
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/aws

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/aws