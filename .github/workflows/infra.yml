name: Multi-Cloud Infrastructure Deployment

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: 'Which cloud to deploy?'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - azure
          - aws

permissions:
  id-token: write
  contents: read

env:
  # Azure – these are automatically available in the reusable workflow
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  deploy-azure:
    if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure' }}
    uses: ./.github/workflows/terraform-deploy.yml
    with:
      cloud: azure
      working-directory: terraform/azure
      environment-apply: Apply-Azure
      environment-high-risk: high-risk-azure
    secrets: inherit   # passes all secrets (Azure ones) to the reusable workflow

  deploy-aws:
    if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'aws' }}
    uses: ./.github/workflows/terraform-deploy.yml
    with:
      cloud: aws
      working-directory: terraform/aws
      environment-apply: Apply-AWS
      environment-high-risk: high-risk-aws
      aws-arn: ${{ vars.AWS_ARN }}
      aws-region: ${{ vars.AWS_REGION }}
    secrets: inherit