name: Multi-Cloud Infrastructure Deployment

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: 'Which cloud to deploy?'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - azure
          - aws

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}-${{ github.event.inputs.cloud }}
  cancel-in-progress: false

jobs:
  # ----------------------------
  # 1. Plan Phase
  # ----------------------------
  plan-azure:
    name: Plan Azure
    uses: ./.github/workflows/reusable-terraform-plan.yml
    if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure' }}
    with:
      cloud_provider: azure
      working_directory: terraform/azure
      artifact_name: tfplan-azure
    secrets: inherit

  plan-aws:
    name: Plan AWS
    uses: ./.github/workflows/reusable-terraform-plan.yml
    if: ${{ github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'aws' }}
    with:
      cloud_provider: aws
      working_directory: terraform/aws
      artifact_name: tfplan-aws
    secrets: inherit

  # ----------------------------
  # 2. Approval Gates
  # ----------------------------
  approve-azure:
    name: Approve Azure
    runs-on: ubuntu-latest
    needs: plan-azure
    if: always() && (github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure')
    environment: ${{ needs.plan-azure.outputs.high_risk == 'true' && 'high-risk-azure' || 'standard-azure' }}
    steps:
      - run: echo "Azure Approval Gate Passed"

  approve-aws:
    name: Approve AWS
    runs-on: ubuntu-latest
    needs: plan-aws
    if: always() && (github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'aws')
    environment: ${{ needs.plan-aws.outputs.high_risk == 'true' && 'high-risk-aws' || 'standard-aws' }}
    steps:
      - run: echo "AWS Approval Gate Passed"

  # ----------------------------
  # 3. Apply Phase
  # ----------------------------
  apply-azure:
    name: Apply Azure
    uses: ./.github/workflows/reusable-terraform-apply.yml
    needs: [plan-azure, approve-azure]
    if: >
      always() && 
      (github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'azure') &&
      needs.plan-azure.result == 'success' &&
      needs.approve-azure.result == 'success'
    with:
      cloud_provider: azure
      working_directory: terraform/azure
      artifact_name: tfplan-azure
    secrets: inherit

  apply-aws:
    name: Apply AWS
    uses: ./.github/workflows/reusable-terraform-apply.yml
    needs: [plan-aws, approve-aws]
    if: >
      always() && 
      (github.event.inputs.cloud == 'all' || github.event.inputs.cloud == 'aws') &&
      needs.plan-aws.result == 'success' &&
      needs.approve-aws.result == 'success'
    with:
      cloud_provider: aws
      working_directory: terraform/aws
      artifact_name: tfplan-aws
    secrets: inherit