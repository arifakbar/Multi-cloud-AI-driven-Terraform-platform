name: Reusable Terraform Plan

on:
  workflow_call:
    inputs:
      cloud_provider:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
    outputs:
      high_risk:
        description: "Whether the plan contains high risk changes"
        value: ${{ jobs.plan.outputs.high_risk }}

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      high_risk: ${{ steps.severity.outputs.high }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- AI / Security Setup ---
      - name: Check AI Engine Dependencies
        id: check-deps
        run: |
          if [ -f "ai-engine/requirements.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Cache Pip
        if: steps.check-deps.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-engine/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup Python
        if: steps.check-deps.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI Dependencies
        if: steps.check-deps.outputs.exists == 'true'
        run: pip install --quiet -r ai-engine/requirements.txt

      - name: Build Vector Index
        if: steps.check-deps.outputs.exists == 'true'
        run: python ai-engine/embedder.py

      # --- Authentication Logic ---
      - name: Azure Login
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure AWS Credentials
        if: inputs.cloud_provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1  # HARDCODED PER REQUEST
          role-duration-seconds: 1200

      # --- Terraform Logic ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform plan -out=tfplan -input=false -no-color

      - name: Export Plan JSON
        working-directory: ${{ inputs.working_directory }}
        run: terraform show -json tfplan > plan.json

      - name: Run AI Analyzer
        run: python ai-engine/analyzer.py ${{ inputs.working_directory }}/plan.json

      - name: Check Severity
        id: severity
        run: |
          RESULT=$(python ai-engine/check_severity.py)
          if echo "$RESULT" | grep -q "high=true"; then
            echo "high=true" >> $GITHUB_OUTPUT
          else
            echo "high=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1
          if-no-files-found: error